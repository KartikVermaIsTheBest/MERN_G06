<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="">
    <style>
        #container{
            width: 90%;
            margin: auto;
            height: 500px;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            background-color: darkseagreen;
        }
        #container > div{
            height: 150px;
            width: 30%;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: beige;
            border-radius: 5%;
            box-shadow: rgb(38, 57, 77) 0px 20px 30px -10px;
        }
    </style>
</head>
<body>
    <div id="container">
        <div style="font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;">I am Div 1</div>
        <div style="font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;">I am Div 2</div>
        <div style="font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;">I am Div 3</div>
    </div>
</body>
</html>
